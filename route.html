<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Route Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  #map { height: 100vh; width: 100%; cursor: pointer; }
  #info {
    position: absolute;
    top: 10px;
    left: 50px;
    z-index: 999;
    background: white;
    padding: 6px 12px;
    border-radius: 6px;
    font-family: sans-serif;
    font-size: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .leaflet-control-attribution {
    font-size: 9px;
    opacity: 0.6;
  }
</style>
</head>
<body>
<div id="info">Loading route...</div>
<div id="map"></div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const fromParts = params.get('from').split(',').map(Number);
const toParts = params.get('to').split(',').map(Number);
const fromLat = fromParts[0], fromLng = fromParts[1];
const toLat = toParts[0], toLng = toParts[1];

const map = L.map('map').setView([fromLat, fromLng], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

L.marker([fromLat, fromLng]).addTo(map).bindPopup('Origin');
L.marker([toLat, toLng]).addTo(map).bindPopup('Destination');

// Click anywhere on the map to open full Google Maps directions in a new tab
map.on('click', function() {
  window.open(
    `https://www.google.com/maps/dir/?api=1&origin=${fromLat},${fromLng}&destination=${toLat},${toLng}&travelmode=driving`,
    '_blank'
  );
});

fetch(`https://router.project-osrm.org/route/v1/driving/${fromLng},${fromLat};${toLng},${toLat}?overview=full&geometries=geojson`)
  .then(r => r.json())
  .then(data => {
    const route = data.routes[0];
    const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);
    const line = L.polyline(coords, {color: 'blue', weight: 5}).addTo(map);
    map.fitBounds(line.getBounds());

    const mins = Math.round(route.duration / 60);
    const km = (route.distance / 1000).toFixed(1);
    document.getElementById('info').innerText = `${km} km · ~${mins} min`;
  })
  .catch(err => {
    document.getElementById('info').innerText = 'Could not load route.';
    console.error(err);
  });
</script>
</body>
</html>
