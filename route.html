<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Route Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}

#map-link {
    display: block;
    height: 100vh;
    width: 100%;
    cursor: pointer;
}

#map {
    height: 100%;
    width: 100%;
    pointer-events: none;
}

#info {
    position: absolute;
    top: 10px;
    left: 50px;
    z-index: 999;
    background: white;
    padding: 10px 15px;
    border-radius: 6px;
    font-family: Arial, sans-serif;
    font-size: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    line-height: 1.5;
}

.leaflet-control-attribution {
    font-size: 9px;
    opacity: 0.6;
}
</style>

</head>

<body>

<div id="info">
    Loading route...
</div>

<a id="map-link" href="#" target="_blank" rel="noopener">
    <div id="map"></div>
</a>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const params = new URLSearchParams(window.location.search);

const fromParts = params.get('from').split(',').map(Number);
const toParts = params.get('to').split(',').map(Number);

const fromLat = fromParts[0];
const fromLng = fromParts[1];

const toLat = toParts[0];
const toLng = toParts[1];

// Google Maps navigation link
document.getElementById('map-link').href =
`https://www.google.com/maps/dir/?api=1&origin=${fromLat},${fromLng}&destination=${toLat},${toLng}&travelmode=driving`;

// Create map
const map = L.map('map').setView([fromLat, fromLng], 10);

// OpenStreetMap layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// Truck icon (Origin)
const truckIcon = L.divIcon({
    html: '🚚',
    className: '',
    iconSize: [30, 30],
    iconAnchor: [15, 15]
});

// Warehouse icon (Destination)
const warehouseIcon = L.divIcon({
    html: '🏭',
    className: '',
    iconSize: [30, 30],
    iconAnchor: [15, 15]
});

// Origin marker
L.marker([fromLat, fromLng], {icon: truckIcon})
 .addTo(map)
 .bindTooltip('From Warehouse', {
      permanent: true,
      direction: 'top'
 });

// Destination marker
L.marker([toLat, toLng], {icon: warehouseIcon})
 .addTo(map)
 .bindTooltip('To Warehouse', {
      permanent: true,
      direction: 'top'
 });

// Route
fetch(
`https://router.project-osrm.org/route/v1/driving/${fromLng},${fromLat};${toLng},${toLat}?overview=full&geometries=geojson`
)
.then(r => r.json())
.then(data => {

    const route = data.routes[0];

    const coords = route.geometry.coordinates.map(
        c => [c[1], c[0]]
    );

    const line = L.polyline(coords, {
        color: 'blue',
        weight: 5
    }).addTo(map);

    map.fitBounds(line.getBounds());

    const mins = Math.round(route.duration / 60);
    const km = (route.distance / 1000).toFixed(1);

    document.getElementById('info').innerHTML =
    `
    <b>FROM:</b> Warehouse<br>
    <b>TO:</b> Destination Warehouse<br>
    <b>DISTANCE:</b> ${km} km<br>
    <b>DURATION:</b> ~${mins} min
    `;
})
.catch(err => {

    document.getElementById('info').innerHTML =
    `
    <b>FROM:</b> Warehouse<br>
    <b>TO:</b> Destination Warehouse<br>
    Could not load route.
    `;

    console.error(err);
});

</script>

</body>
</html>
